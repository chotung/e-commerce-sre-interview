version: '3.8'

services:
  mongodb:
    image: mongo:8.0
    container_name: ecommerce_mongodb
    environment:
      MONGO_INITDB_DATABASE: ecommerce_development
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: ecommerce_rails
    command: bash -c "rm -f tmp/pids/server.pid && bundle exec rails server -b 0.0.0.0"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    environment:
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: ecommerce_development
      RAILS_ENV: development
    depends_on:
      mongodb:
        condition: service_healthy
    stdin_open: true
    tty: true

volumes:
  mongodb_data:
  bundle_cache:
